name: HMM Dashboard

# Builds the static HMM regime-forecast dashboard and deploys it to GitHub
# Pages. Triggered hourly during US market hours, on every push to the
# dashboard sources, and manually via the Actions tab.
#
# One-time setup: in the repo settings, go to Settings -> Pages -> Source:
# "GitHub Actions". After the first successful run the site will be live at
# https://<owner>.github.io/<repo>/ — bookmark that URL on your iPhone.

on:
  schedule:
    # Hourly during US RTH (Mon-Fri, 13:00-21:00 UTC covers EDT and EST).
    - cron: '0 13-21 * * 1-5'
  push:
    branches:
      - main
      - claude/hmm-market-prediction-LkHzv
    paths:
      - 'dashboard/**'
      - 'macro/hmm_regime.py'
      - 'macro/macro.py'
      - 'data/fetcher.py'
      - '.github/workflows/hmm-dashboard.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel in-progress deploys — let each scheduled run finish.
concurrency:
  group: hmm-dashboard
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: dashboard/requirements.txt

      - name: Install dashboard dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dashboard/requirements.txt

      - name: Build static HMM dashboard
        env:
          # Optional — if not set, FRED + sentiment features just gracefully skip
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python -m dashboard.build_static --days 30

      - name: List built site contents
        run: ls -la dashboard/site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
