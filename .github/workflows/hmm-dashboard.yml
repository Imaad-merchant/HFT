name: HMM Dashboard

# Builds the static HMM regime-forecast dashboard and deploys it to GitHub
# Pages. Triggered hourly during US market hours, on every push to the
# dashboard sources, and manually via the Actions tab.
#
# One-time setup: in the repo settings, go to Settings -> Pages -> Source:
# "GitHub Actions". After the first successful run the site will be live at
# https://<owner>.github.io/<repo>/ — bookmark that URL on your iPhone.

on:
  schedule:
    # Hourly during US RTH (Mon-Fri, 13:00-21:00 UTC covers EDT and EST).
    - cron: '0 13-21 * * 1-5'
  push:
    branches:
      - main
      - claude/hmm-market-prediction-LkHzv
    paths:
      - 'dashboard/**'
      - 'macro/hmm_regime.py'
      - 'macro/macro.py'
      - 'data/fetcher.py'
      - '.github/workflows/hmm-dashboard.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel in-progress deploys — let each scheduled run finish.
concurrency:
  group: hmm-dashboard
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: dashboard/requirements.txt

      - name: Install dashboard dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dashboard/requirements.txt

      - name: Build static HMM dashboard
        env:
          # Optional — if not set, FRED + sentiment features just gracefully skip
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python -m dashboard.build_static --days 30

      - name: List built site contents
        run: ls -la dashboard/site/

      # Always upload the built site as a regular workflow artifact so the
      # full dashboard (HTML + PNGs + CSV + JSON) is downloadable from the
      # Actions UI even before GitHub Pages is enabled in repo settings.
      - name: Upload site as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hmm-dashboard-site
          path: dashboard/site
          retention-days: 7

      # The remaining steps deploy to GitHub Pages. They are gated on Pages
      # being enabled in Settings -> Pages -> Source: GitHub Actions. If Pages
      # is not yet enabled, configure-pages will fail fast with a 404 — we
      # `continue-on-error` so the workflow stays green and the regular
      # artifact above is still available, then skip the dependent steps.
      - name: Configure GitHub Pages
        id: configure_pages
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload Pages artifact
        if: steps.configure_pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/site

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.configure_pages.outcome == 'success'
        uses: actions/deploy-pages@v4

      - name: Pages setup hint
        if: steps.configure_pages.outcome != 'success'
        run: |
          echo "::warning title=GitHub Pages not enabled::To make the dashboard live at https://<owner>.github.io/<repo>/, go to Settings -> Pages -> Source: GitHub Actions, then re-run this workflow. The built site is available above as the 'hmm-dashboard-site' workflow artifact."
